<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea 2 — Dial + Graph Below</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d0d1a; color: #e0e0e0; min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 30px 20px;
}

.page {
  width: 100%; max-width: 900px;
  display: flex; flex-direction: column; gap: 22px;
}

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; }
.nav-arrow {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #888; font-size: 20px;
}
.date-block { text-align: center; }
.date-day { font-size: 14px; color: #aaa; }
.date-main { font-size: 22px; font-weight: 600; color: #fff; }

/* Section labels */
.section-label {
  font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 6px;
}

/* ── Dial Section (matches current app) ── */
.dial-section {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 0 4px;
}
.dial-wrap {
  position: relative; width: 340px; max-width: 100%;
  aspect-ratio: 340 / 200; overflow: hidden;
}
.dial-svg { width: 100%; height: 100%; display: block; }
.dial-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 16; }
.dial-fill {
  fill: none; stroke: url(#dialGrad); stroke-width: 16;
  stroke-linecap: round;
  stroke-dasharray: 300; stroke-dashoffset: 95;
}
.dial-centre {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  width: 100%;
  pointer-events: none;
}
.dial-label-top {
  font-size: 9px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 1px;
}
.dial-value-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 3px;
}
.dial-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
}
.dial-divider {
  width: 32px;
  height: 2px;
  background: rgba(255,255,255,0.1);
  margin: 6px auto;
  border-radius: 2px;
}
.dial-today-label {
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.dial-cost {
  font-size: 18px;
  font-weight: 600;
  color: #aaa;
  margin-top: 1px;
}

/* Legend under dial */
.dial-legend { display: flex; gap: 20px; margin-top: 8px; }
.dl-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #999; }
.dl-dot { width: 10px; height: 10px; border-radius: 3px; }
.dl-dot.peak { background: #ff5252; }
.dl-dot.off { background: #00e676; }
.dl-dot.shoulder { background: #ffab00; }

/* ── Chart Section ── */
.chart-section { }
.chart-wrap { position: relative; width: 100%;   height: 70px; }

/* ── Mini Stats (matches current app) ── */
.mini-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.mini-stat {
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  padding: 10px 12px;
}
.mini-stat .lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.mini-stat .val { font-size: 18px; font-weight: 600; color: #fff; margin-top: 2px; }
.mini-stat .val small { font-size: 12px; font-weight: 400; color: #888; margin-left: 2px; }
</style>
</head>
<body>
<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="nav-arrow">&#x2039;</div>
    <div class="date-block">
      <div class="date-day">Monday</div>
      <div class="date-main">July 12, 2026</div>
    </div>
    <div class="nav-arrow">&#x203a;</div>
  </div>

  <!-- Dial -->
  <div class="dial-section">
    <div class="dial-wrap">
      <svg class="dial-svg" viewBox="0 0 340 200">
        <defs>
          <linearGradient id="dialGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00e676"/>
            <stop offset="40%" stop-color="#ffab00"/>
            <stop offset="100%" stop-color="#ff5252"/>
          </linearGradient>
        </defs>
        <path class="dial-bg" d="M 30 175 A 140 140 0 0 1 310 175"/>
        <path class="dial-fill" d="M 30 175 A 140 140 0 0 1 310 175"/>
      </svg>
      <div class="dial-centre">
        <div class="dial-label-top">Current spending</div>
        <div class="dial-value-row">
          <span class="dial-value">$4.50</span>
        </div>
        <div class="dial-divider"></div>
        <div class="dial-today-label">Energy usage</div>
        <div class="dial-cost">15.0 kWh</div>
      </div>
    </div>
  </div>

  <!-- Subtle chart -->
  <div class="chart-section">
    <div class="chart-wrap">
      <canvas id="subtleChart"></canvas>
    </div>
    <div class="dial-legend" style="margin-top:6px; justify-content:center;">
      <span class="dl-item"><span class="dl-dot peak"></span> Peak (2pm–8pm)</span>
      <span class="dl-item"><span class="dl-dot shoulder"></span> Shoulder</span>
      <span class="dl-item"><span class="dl-dot off"></span> Off-Peak</span>
    </div>
  </div>

  <!-- Mini Stats (current app format) -->
  <div class="mini-stats">
    <div class="mini-stat">
      <div class="lbl">Total Today</div>
      <div class="val">15.0 <small>kWh</small></div>
    </div>
    <div class="mini-stat">
      <div class="lbl">Peak</div>
      <div class="val">0.72 <small>kW</small></div>
    </div>
    <div class="mini-stat">
      <div class="lbl">Average</div>
      <div class="val">0.38 <small>kW</small></div>
    </div>
    <div class="mini-stat">
      <div class="lbl">Est. Cost</div>
      <div class="val">$4.50</div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const canvas = document.getElementById('subtleChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const rawData = [
    0.12, 0.10, 0.09, 0.08, 0.08, 0.15,
    0.32, 0.40, 0.48, 0.45, 0.38, 0.35,
    0.42, 0.48, 0.52, 0.58, 0.62, 0.60,
    0.68, 0.72, 0.70, 0.65, 0.52, 0.38
  ];

  // X-axis labels: time every 3 hours
  const timeLabels = ['12a','3a','6a','9a','12p','3p','6p','9p'];
  const labels = Array(24).fill('');
  for (let i = 0; i < timeLabels.length; i++) {
    labels[i * 3] = timeLabels[i];
  }

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: rawData,
        backgroundColor: rawData.map((v, i) => {
          if (i >= 14 && i <= 19) return 'rgba(255, 82, 82, 0.35)';
          if ((i >= 6 && i <= 13) || (i >= 20 && i <= 21)) return 'rgba(255, 171, 0, 0.25)';
          return 'rgba(0, 230, 118, 0.25)';
        }),
        borderColor: 'transparent',
        borderWidth: 0,
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        y: { display: false, beginAtZero: true },
        x: {
          grid: { display: false },
          ticks: {
            color: '#777',
            font: { size: 9 },
            maxRotation: 0,
          },
        }
      }
    }
  });
});
</script>
</body>
</html>
