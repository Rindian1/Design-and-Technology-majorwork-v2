{% extends "base.html" %}
{% block title %}Create Account — Energy Monitor{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Tell us about your home to get personalised recommendations.</p>

    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="At least 4 characters" required minlength="4" autocomplete="new-password">
      </div>

      <div id="survey-container"></div>

      <p class="form-error" id="register-error"></p>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const errorEl = document.getElementById('register-error');

  authManager.renderSurveyForm('survey-container', async (answers) => {
    errorEl.textContent = '';
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;

    if (!email || !password) {
      errorEl.textContent = 'Email and password are required.';
      return;
    }

    try {
      await authManager.register(email, password, answers);
      window.location.href = '/';
    } catch (err) {
      errorEl.textContent = err.message;
    }
  });
});
</script>
{% endblock %}
