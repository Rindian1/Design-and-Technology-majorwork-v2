<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Energy Monitoring Dashboard">
  <title>{% block title %}Energy Monitor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header-left">
        <button class="tab-btn header-logo active" data-tab="graph">⚡</button>
      </div>
      <div class="header-right">
          <div class="header-tabs">
            <button class="tab-btn" data-tab="general">General Insights</button>
            <button class="tab-btn" data-tab="appliance">Appliance Specific</button>
            <button class="tab-btn" data-tab="goals">Goals</button>
          </div>
          <button class="points-badge" id="points-badge" data-tab="goals" title="View Goals">
            <span class="points-badge-icon">🏆</span>
            <span class="points-badge-value" id="points-badge-value">0</span>
          </button>
        <div class="user-menu" id="user-menu" style="display:none">
          <button class="user-menu-btn" id="user-menu-btn">
            <span id="user-email-display"></span>
            <span class="user-menu-arrow">&#9660;</span>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <button id="edit-preferences-btn">Edit Preferences</button>
            <hr class="dropdown-sep">
            <button id="theme-toggle-btn">Light Mode</button>
            <hr class="dropdown-sep">
            <button id="logout-btn">Log out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading energy data...</p>
  </div>

  <div id="error-modal" class="modal hidden" role="dialog" aria-labelledby="error-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="error-title">Error</h2>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="error-message">An error occurred while loading data.</p>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/api.js') }}?v=4"></script>
  <script src="{{ url_for('static', filename='js/navigation.js') }}?v=4"></script>
  <script src="{{ url_for('static', filename='js/gauge.js') }}?v=5"></script>
  <script src="{{ url_for('static', filename='js/recommendations.js') }}?v=4"></script>
  <script src="{{ url_for('static', filename='js/goals.js') }}?v=4"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}?v=4"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}?v=8"></script>
</body>
</html>
