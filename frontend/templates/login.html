{% extends "base.html" %}
{% block title %}Log In — Energy Monitor{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Energy Monitor</h1>
    <p class="auth-subtitle">Track your usage, save energy, reduce costs.</p>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <p class="form-error" id="login-error"></p>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Log In</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button class="btn btn-secondary btn-full" id="demo-btn">View Demo Dashboard</button>

    <p class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('login-form');
  const errorEl = document.getElementById('login-error');
  const loginBtn = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
      await authManager.login(
        document.getElementById('login-email').value,
        document.getElementById('login-password').value
      );
      window.location.href = '/';
    } catch (err) {
      errorEl.textContent = err.message;
      loginBtn.disabled = false;
      loginBtn.textContent = 'Log In';
    }
  });

  document.getElementById('demo-btn').addEventListener('click', async () => {
    try {
      await authManager.demoLogin();
      window.location.href = '/';
    } catch (err) {
      errorEl.textContent = err.message;
    }
  });
});
</script>
{% endblock %}
